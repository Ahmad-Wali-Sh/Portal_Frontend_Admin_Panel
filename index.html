    <title>Portal Admin</title>

    <!--
      Outfit — Geometric sans-serif.
      Weights: 400 (Regular), 500 (Medium), 600 (SemiBold), 700 (Bold), 800 (ExtraBold)
      Loaded as a <link> in HTML (not @import in CSS) for faster parse time.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!--
      Favicon placeholder — replace with actual academy brand icon.
      SVG favicon technique: renders at any size without rasterization.
    -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%233B82F6'/><text y='.9em' font-size='70' x='15' fill='white' font-family='sans-serif' font-weight='bold'>P</text></svg>"
    />
  </head>
